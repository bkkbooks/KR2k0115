body:
  text: 桂海虞衡志地理類八雜記之屬提要臣等謹案桂海虞衡志一卷宋范成大撰乾道二年成大由中書舍人出知靜江府淳熙二年除敷文閣待制四川制置使是編乃由廣右入蜀之時道中追憶而作自序謂凡所登臨之處與風物土宜方志所未載者萃為一書蠻陬絶徼見聞可紀者亦附著之共十三篇曰志巖洞志金石志香志酒志器志禽志獸志蟲魚志花志果志草木雜志志蠻每篇各有小序皆志其土之所有惟志巖洞僅去城七八里內嘗所遊者志金石準本草之例僅取方藥所須者志蠻僅録聲問相接者故他不備載志香多及海南以世稱二廣出香而不知廣東香自舶上來廣右香産海北者皆凡品志器兼及外蠻兵甲之制以為司邊鎮者所宜知故不嫌旁涉諸篇皆序述簡雅無夸飾土風附㑹古事之習其論辰砂宜砂地脉不殊均生白石牀上訂本草分别之訛雍州出砂融州實不出砂證圖經同音之誤零陵香産宜融諸州非永州之零陵唐書稱林邑出結遼鳥即雍州之秦吉了佛書稱象有四牙六牙其說不實桂嶺在賀州不在廣州亦頗有考證成大石湖詩集凡經厯之地山川風土多記以詩其中第十四卷自注皆桂林作詠花惟有紅豆蔲一首詠果惟有盧橘一首詠遊覽惟有栖霞洞一首佛子巖一首其見於詩注者亦僅蠻茶老酒蚺蛇皮腰鼓象皮兜鍪四事不及他處之詳疑以此志巳具故不更記以詩也其盧橘一種志果不載觀其志花小序稱北州所有皆不録或志果亦用此例蠻茶一種志草朩中亦無之考詩注稱蠻茶出修仁大治頭風而志草木中有風膏藥亦云葉如冬青治太陽痛頭目昏眩或一物二名耶然檢文獻通考四裔考中引桂海虞衡志幾盈一卷皆志蠻之文而此本悉不載其餘諸門檢永樂大典所引亦多在此本之外蓋原書本三卷而此本併為一卷已刋削其大半則諸物之或有或無亦非盡原書之故矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀桂海虞衡志原序始余自薇垣出帥廣右姻親故人張飲松江皆以炎荒風土為戚余以唐人詩考桂林之地少陵謂之宜人樂天謂之無瘴退之至以湘南江山勝於驂鸞仙去則宦遊之適寧有愈於此乎既以解親友而遂行乾道八年三月至郡則風氣清淑果如所聞而巖岫之奇絶俗習之淳古府治之雄勝又有過所聞者余既不鄙其民而民亦矜余之拙而信其誠相戒無欺侮嵗比稔幕府少文書居二年余心安焉承詔徙鎮全蜀亟上疏固謝不能留再閲月辭勿獲命乃與桂民别民觴客於途既出郭又留二日始得行航瀟湘絶洞庭泝灎澦驅兩川半年達于成都道中無事因追記其登臨之處與風物土宜凡方志所未載者稡為一書蠻陬絶徼見聞可紀者亦附著之以備土訓之圖噫錦城以名都樂國聞天下余幸得至焉然且拳拳于桂林至為之綴緝瑣碎如此蓋以信余之不鄙夷其民雖去之逺且在名都樂國而猶弗忘之也淳熙二年乙未長至日吳郡范成大至能書
